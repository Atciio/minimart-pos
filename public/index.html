<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiniMart POS — Punto de Venta</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-icon">PV</div>
  <div class="logo-text">
    <h1>MiniMart POS</h1>
    <span>Sistema Punto de Venta</span>
  </div>
  <div class="header-info">
    <span id="fecha-actual"></span>
    <span class="ventas-badge">Ventas registradas: <strong id="total-ventas-badge">0</strong></span>
  </div>
</header>

<div class="tabs-nav">
  <button class="tab-btn active" onclick="cambiarTab('ventas', this)">Punto de Venta</button>
  <button class="tab-btn" onclick="cambiarTab('catalogos', this)">Catalogo</button>
</div>

<div class="wrapper">
  <div class="pos-grid">

    <!-- COLUMNA IZQUIERDA: Catálogo de productos -->
    <div class="panel">
      <div class="panel-title">Catalogo de Productos</div>

      <input type="text" id="buscar-producto" class="input-buscar"
             placeholder="Buscar producto..." oninput="filtrarProductos()"/>

      <div class="categoria-tabs" id="categoria-tabs"></div>
      <div class="producto-lista" id="producto-lista"></div>
    </div>

    <!-- COLUMNA CENTRAL: Ticket actual -->
    <div class="panel panel-ticket">
      <div class="panel-title">Ticket Actual
        <span id="ticket-num" class="ticket-num"></span>
      </div>

      <!-- Selector de cliente -->
      <div class="field-group">
        <label class="field-label">Cliente</label>
        <select id="select-cliente" class="input-field">
          <option value="">-- Seleccionar cliente --</option>
        </select>
      </div>

      <!-- Selector de fecha -->
      <div class="field-group">
        <label class="field-label">Fecha de venta</label>
        <input type="date" id="fecha-venta" class="input-field"/>
      </div>

      <!-- Items del ticket -->
      <div class="ticket-items" id="ticket-items">
        <div class="ticket-empty">Agrega productos desde el catálogo</div>
      </div>

      <!-- Totales -->
      <div class="ticket-totales">
        <div class="total-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="total-row total-final">
          <span>TOTAL</span>
          <span id="total-final">$0.00</span>
        </div>
      </div>

      <!-- Botones de acción -->
      <div class="ticket-acciones">
        <button class="btn-cancelar" onclick="cancelarTicket()">Cancelar</button>
        <button class="btn-registrar" onclick="registrarVenta()">Registrar Venta</button>
      </div>
    </div>

    <!-- COLUMNA DERECHA: Historial -->
    <div class="panel">
      <div class="panel-title">Ventas Registradas</div>

      <div class="field-group">
        <label class="field-label">Tienda</label>
        <select id="filtro-ciudad" class="input-field" onchange="aplicarFiltros()">
          <option value="">-- Todas las tiendas --</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 12px;">
        <input type="text" id="buscar-ticket" class="input-buscar"
               placeholder="Buscar por ticket..." oninput="aplicarFiltros()" style="flex: 1;"/>
        <button class="btn-exportar" onclick="imprimirTickets()" style="padding: 9px 16px; white-space: nowrap;">🖨️ Imprimir</button>
      </div>

      <div class="historial-stats">
        <div class="stat-item">
          <div class="stat-val" id="stat-tickets">0</div>
          <div class="stat-lbl">Tickets</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="stat-productos">0</div>
          <div class="stat-lbl">Lineas</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="stat-total">$0</div>
          <div class="stat-lbl">Total</div>
        </div>
      </div>

      <div class="historial-lista" id="historial-lista">
        <div class="ticket-empty">Sin ventas registradas</div>
      </div>


    </div>

  </div>
</div>

<!-- VISTA CATALOGOS -->
<div id="vista-catalogos" style="display:none">
  <div class="catalogos-grid">

    <!-- CLIENTES -->
    <div class="panel">
      <div class="panel-title">Clientes</div>

      <div class="field-group">
        <label class="field-label">Nombre completo</label>
        <input type="text" id="cli-nombre" class="input-field" placeholder="Ej. Maria Lopez"/>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <div class="field-group">
          <label class="field-label">Edad</label>
          <input type="number" id="cli-edad" class="input-field" min="18" max="80" value="30"/>
        </div>
        <div class="field-group">
          <label class="field-label">Genero</label>
          <select id="cli-genero" class="input-field">
            <option value="M">M</option>
            <option value="F">F</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Ciudad</label>
        <select id="cli-ciudad" class="input-field">
          <option value="">-- Seleccionar ciudad --</option>
          <option value="Aguascalientes">Aguascalientes</option>
          <option value="CDMX">CDMX</option>
          <option value="Chihuahua">Chihuahua</option>
          <option value="Guadalajara">Guadalajara</option>
          <option value="León">León</option>
          <option value="Monterrey">Monterrey</option>
          <option value="Mérida">Mérida</option>
          <option value="Puebla">Puebla</option>
          <option value="Querétaro">Querétaro</option>
          <option value="San Luis Potosí">San Luis Potosí</option>
          <option value="Tijuana">Tijuana</option>
          <option value="Toluca">Toluca</option>
        </select>
      </div>
      <button class="btn-registrar" onclick="agregarCliente()">Agregar Cliente</button>

      <div class="catalogo-lista" id="lista-clientes"></div>
    </div>

    <!-- PRODUCTOS -->
    <div class="panel">
      <div class="panel-title">Productos</div>

      <div class="field-group">
        <label class="field-label">Nombre del producto</label>
        <input type="text" id="prod-nombre" class="input-field" placeholder="Ej. Teclado Gaming"/>
      </div>
      <div class="field-group">
        <label class="field-label">Categoria</label>
        <select id="prod-categoria" class="input-field">
          <option>Electronica</option>
          <option>Mobiliario</option>
          <option>Papeleria</option>
          <option>Accesorios</option>
        </select>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <div class="field-group">
          <label class="field-label">Precio venta ($)</label>
          <input type="number" id="prod-precio" class="input-field" min="1" placeholder="0.00"/>
        </div>
        <div class="field-group">
          <label class="field-label">Costo ($)</label>
          <input type="number" id="prod-costo" class="input-field" min="1" placeholder="0.00"/>
        </div>
      </div>
      <button class="btn-registrar" onclick="agregarProducto()">Agregar Producto</button>

      <div class="catalogo-lista" id="lista-productos"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL de cantidad/descuento -->
<div class="modal-overlay" id="modal" onclick="cerrarModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-producto-nombre"></div>
    <div class="modal-precio" id="modal-producto-precio"></div>
    <div class="field-group">
      <label class="field-label">Cantidad</label>
      <input type="number" id="modal-cantidad" class="input-field" min="1" max="99" value="1"/>
    </div>
    <div class="field-group">
      <label class="field-label">Descuento (%)</label>
      <select id="modal-descuento" class="input-field">
        <option value="0">Sin descuento</option>
        <option value="5">5%</option>
        <option value="10">10%</option>
        <option value="15">15%</option>
        <option value="20">20%</option>
      </select>
    </div>
    <div class="modal-total-preview" id="modal-total-preview"></div>
    <div class="modal-acciones">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-registrar" onclick="agregarAlTicket()">Agregar</button>
    </div>
  </div>
</div>

<script src="/js/pos.js"></script>
</body>
</html>
